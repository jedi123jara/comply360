<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Comply360 — 5 direcciones visuales</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0c0c0d; font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { width: 100%; height: 100vh; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="cockpit-data.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="v1-linen.jsx"></script>
<script type="text/babel" src="v2-vault.jsx"></script>
<script type="text/babel" src="v3-andean.jsx"></script>
<script type="text/babel" src="v4-atelier.jsx"></script>
<script type="text/babel" src="v5-operativo.jsx"></script>

<script type="text/babel" data-presets="react">
const { useEffect, useState } = React;

function App() {
  const [ready, setReady] = useState(false);
  useEffect(() => {
    // Wait until all variation components have registered.
    const check = () => {
      if (window.V1Linen && window.V2Vault && window.V3Andean && window.V4Atelier && window.V5Operativo && window.DesignCanvas) {
        setReady(true);
      } else {
        setTimeout(check, 80);
      }
    };
    check();
  }, []);

  if (!ready) {
    return (
      <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#888", fontFamily: "Inter, sans-serif" }}>
        Cargando exploración…
      </div>
    );
  }

  const ART_W = 1320;
  const ART_H = 880;

  return (
    <window.DesignCanvas title="Comply360 · 5 direcciones visuales" subtitle="Mismo Cockpit, 5 sistemas visuales distintos · arrastra para reordenar · click en una para ver fullscreen">
      <window.DCSection id="dirs" title="Direcciones" subtitle="De editorial calmado a banking-grade. Pickea uno (o mezcla) y aplicamos al resto del producto.">
        <window.DCArtboard id="v1" label="01 · Lima Linen" width={ART_W} height={ART_H} description="Editorial calmado · papel cálido · Instrument Serif · acento esmeralda único · Stripe + Mercury">
          <window.V1Linen />
        </window.DCArtboard>
        <window.DCArtboard id="v2" label="02 · Vault Pro" width={ART_W} height={ART_H} description="Obsidiana profundo · neon esmeralda · mono labels · denso Bloomberg-meets-Linear-dark">
          <window.V2Vault />
        </window.DCArtboard>
        <window.DCArtboard id="v3" label="03 · Andean Bold" width={ART_W} height={ART_H} description="Magazine cover · display Fraunces · terracota + esmeralda · brutalist edges · sello editorial">
          <window.V3Andean />
        </window.DCArtboard>
        <window.DCArtboard id="v4" label="04 · Soft Atelier" width={ART_W} height={ART_H} description="Glassmorfismo suave · lavanda + esmeralda pastel · rounded-2xl · Notion / Mercury moderno">
          <window.V4Atelier />
        </window.DCArtboard>
        <window.DCArtboard id="v5" label="05 · Operativo Pro" width={ART_W} height={ART_H} description="Banking-grade · cobalto + IBM Plex Mono · hairlines · denso, autoridad SUNAT/legal">
          <window.V5Operativo />
        </window.DCArtboard>
      </window.DCSection>
    </window.DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
