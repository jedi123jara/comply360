<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="sh1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="aura1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <style>
      .aura {
        transform-origin: 32px 34px;
        animation: aura-breathe 1.6s ease-in-out infinite;
      }
      .pulse-ring {
        transform-origin: 32px 34px;
        animation: ring-expand 1.6s ease-out infinite;
      }
      .heartbeat {
        transform-origin: 32px 32px;
        animation: heartbeat 1.6s ease-in-out infinite;
      }
      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        14% { transform: scale(1.06); }
        28% { transform: scale(0.99); }
        42% { transform: scale(1.03); }
        70% { transform: scale(1); }
      }
      @keyframes aura-breathe {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.18); opacity: 1; }
      }
      @keyframes ring-expand {
        0% { transform: scale(0.85); opacity: 0.7; }
        100% { transform: scale(1.35); opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .aura, .pulse-ring, .heartbeat { animation: none; }
      }
    </style>
  </defs>
  <circle class="aura" cx="32" cy="34" r="26" fill="url(#aura1)"/>
  <circle class="pulse-ring" cx="32" cy="34" r="22" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.7"/>
  <g class="heartbeat">
    <path d="M32 4 L54 12 V30 C54 44 44 54 32 60 C20 54 10 44 10 30 V12 Z" fill="url(#g1)"/>
    <path d="M32 4 L54 12 V22 C42 26 22 26 10 22 V12 Z" fill="url(#sh1)" opacity="0.6"/>
    <path d="M22 32 L29 39 L43 23" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
